<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JS Tasks</title>
<style>
    body { font-family: Arial; padding: 20px; }
    input, button { margin: 5px; padding: 8px; }
    .highlight { background: yellow; }
</style>
</head>
<body>

<!-- 1. Phone Number Cleaning -->
<h3>1. Phone Number Cleaning</h3>
<input type="text" id="phone" placeholder="Enter phone number">
<button onclick="cleanPhone()">Clean</button>
<p id="phoneResult"></p>

<!-- 2. Password Strength -->
<h3>2. Password Strength Check</h3>
<input type="password" id="password" placeholder="Enter password">
<button onclick="checkPassword()">Check</button>
<p id="passResult"></p>

<!-- 3. Highlight Keywords -->
<h3>3. Highlight Search Keywords</h3>
<input type="text" id="text" placeholder="Enter text">
<input type="text" id="keyword" placeholder="Keyword">
<button onclick="highlightText()">Highlight</button>
<p id="highlightResult"></p>

<!-- 4. Clock -->
<h3>4. Timer / Clock</h3>
<p id="clock"></p>

<!-- 5. Date Formatting -->
<h3>5. Date Formatting</h3>
<input type="date" id="dateInput">
<button onclick="formatDate()">Format</button>
<p id="dateResult"></p>

<!-- Link External JS -->
<script src="stylw.js"></script>

</body>
</html>
